<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/titlebar.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/truestudio.css">
  <link rel="stylesheet" href="src/styles/multidm.css">
</head>
<body>
  <div class="app-container">

    <!-- Title Bar -->
    <div class="title-bar">
      <div class="title">
        <div class="title-dot"></div>
        Discord Manager
      </div>
      <div class="window-controls">
        <button class="info-button" id="infoBtn" title="About">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </button>
        <button id="minimizeBtn" title="Minimize">
          <svg viewBox="0 0 12 12"><rect width="10" height="1" x="1" y="6" stroke="currentColor" fill="currentColor" rx="0.5"/></svg>
        </button>
        <button id="maximizeBtn" title="Maximize">
          <svg viewBox="0 0 12 12"><rect width="9" height="9" x="1.5" y="1.5" fill="none" stroke="currentColor" rx="1"/></svg>
        </button>
        <button id="closeBtn" title="Close">
          <svg viewBox="0 0 12 12">
            <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="main-wrapper">
      <!-- Sidebar -->
      <nav class="nav-sidebar">
        <div class="nav-items">

          <div class="nav-item active" data-page="login" id="loginNavItem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            <span>Login</span>
          </div>

          <div class="nav-item hidden" data-page="friends">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Friends</span>
          </div>

          <div class="nav-item hidden" data-page="servers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <span>Servers</span>
          </div>

          <div class="nav-item hidden" data-page="dms">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>DMs</span>
          </div>

          <div class="nav-item hidden" data-page="groups">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Groups</span>
          </div>

          <div class="nav-item hidden" data-page="ts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
            <span>Bot-Studio</span>
          </div>

        </div>

        <!-- User Profile -->
        <div class="user-profile" id="userProfile">
          <div class="user-avatar">
            <span id="userInitial"></span>
          </div>
          <div class="user-info">
            <div class="user-name" id="userName"></div>
          </div>
          <button class="disconnect-btn" id="disconnectBtn">Out</button>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="main-content">

        <!-- Login Page -->
        <div class="page-container active" id="login-page">
          <div class="login-container">
            <div class="login-box">
              <h1>Welcome Back</h1>
              <p class="login-subtitle">Enter your Discord token to connect</p>
              <div class="input-group">
                <input type="password" id="tokenInput" placeholder="Discord token…" autocomplete="off">
              </div>
              <div class="button-group">
                <button id="connectBtn">
                  <span class="btn-text">Connect</span>
                  <div class="loader" style="display:none;"></div>
                </button>
                <button id="saveTokenBtn" class="secondary">Save Token</button>
              </div>
              <div id="status"></div>
              <div class="token-management" id="tokenManagement"></div>
            </div>
          </div>
        </div>

        <!-- Other Pages -->
        <div class="page-container" id="friends-page"></div>
        <div class="page-container" id="servers-page"></div>
        <div class="page-container" id="dms-page"></div>
        <div class="page-container" id="groups-page"></div>
        <div class="page-container" id="ts-page"></div>

      </div>
    </div>
  </div>

  <script src="src/utils/webAPI.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
