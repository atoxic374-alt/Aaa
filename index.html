<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/titlebar.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/multidm.css">
</head>
<body>
  <div class="app-container">

    <!-- Title Bar -->
    <div class="title-bar">
      <div class="title">
        <div class="title-dot"></div>
        Discord Manager
      </div>
      <div class="window-controls">
        <button class="info-button" id="infoBtn" title="About">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </button>
        <button id="minimizeBtn" title="Minimize">
          <svg viewBox="0 0 12 12"><rect width="10" height="1" x="1" y="6" stroke="currentColor" fill="currentColor" rx="0.5"/></svg>
        </button>
        <button id="maximizeBtn" title="Maximize">
          <svg viewBox="0 0 12 12"><rect width="9" height="9" x="1.5" y="1.5" fill="none" stroke="currentColor" rx="1"/></svg>
        </button>
        <button id="closeBtn" title="Close">
          <svg viewBox="0 0 12 12">
            <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="main-wrapper">
      <!-- Sidebar -->
      <nav class="nav-sidebar">
        <div class="nav-items">

          <div class="nav-item active" data-page="login" id="loginNavItem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            <span>Login</span>
          </div>

          <div class="nav-item hidden" data-page="friends">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Friends</span>
          </div>

          <div class="nav-item hidden" data-page="servers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <span>Servers</span>
          </div>

          <div class="nav-item hidden" data-page="dms">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>DMs</span>
          </div>

          <div class="nav-item hidden" data-page="groups">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Groups</span>
          </div>

        </div>

        <!-- User Profile -->
        <div class="user-profile" id="userProfile">
          <div class="user-avatar">
            <span id="userInitial"></span>
          </div>
          <div class="user-info">
            <div class="user-name" id="userName"></div>
          </div>
          <button class="disconnect-btn" id="disconnectBtn">Out</button>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="main-content">

        <!-- Login Page -->
        <div class="page-container active" id="login-page">
          <div class="login-container">
            <div class="login-box">
              <h1>Welcome Back</h1>
              <p class="login-subtitle">Enter your Discord token to connect</p>
              <div class="input-group">
                <input type="password" id="tokenInput" placeholder="Discord token…" autocomplete="off">
              </div>
              <div class="button-group">
                <button id="connectBtn">
                  <span class="btn-text">Connect</span>
                  <div class="loader" style="display:none;"></div>
                </button>
                <button id="saveTokenBtn" class="secondary">Save Token</button>
              </div>
              <div id="status"></div>
              <div class="token-management" id="tokenManagement"></div>

              <!-- Support Links -->
              <div class="login-support-links">
                <a class="login-support-link" id="discordSupportLink" href="#">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
                  </svg>
                  discord.gg/ens
                </a>
                <span class="login-support-sep">·</span>
                <a class="login-support-link" id="instaSupportLink" href="#">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                  </svg>
                  a_13qn
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Other Pages -->
        <div class="page-container" id="friends-page"></div>
        <div class="page-container" id="servers-page"></div>
        <div class="page-container" id="dms-page"></div>
        <div class="page-container" id="groups-page"></div>

      </div>
    </div>
  </div>

  <script src="src/utils/webAPI.js"></script>
  <script type="module" src="src/main.js"></script>

  <script>
    document.getElementById('discordSupportLink').addEventListener('click', e => {
      e.preventDefault();
      window.electronAPI.openExternal('https://discord.gg/ens');
    });
    document.getElementById('instaSupportLink').addEventListener('click', e => {
      e.preventDefault();
      window.electronAPI.openExternal('https://instagram.com/a_13qn');
    });
  </script>
</body>
</html>
